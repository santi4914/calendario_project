# .github/workflows/code_quality.yml

name: Code Quality Checks # Nombre que aparecerá en GitHub Actions

on:
  # Este workflow se ejecutará en los siguientes eventos:
  pull_request: # Cuando se abre un Pull Request o se añade un nuevo commit
    branches: [ main, master ] # Solo para PRs dirigidos a estas ramas
  push: # Opcional: También puedes ejecutarlo en cada push a estas ramas
    branches: [ main, master ]
  workflow_dispatch: # Permite ejecutar el workflow manualmente desde GitHub UI

jobs:
  lint:
    name: Run Flake8 Linting # Nombre del job para linting
    runs-on: ubuntu-latest # Se ejecuta en una máquina virtual Linux

    steps:
    - name: Checkout code # Paso 1: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Set up Python # Paso 2: Configurar el entorno de Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Puedes especificar una versión exacta como '3.9' o '3.10'

    - name: Install dependencies # Paso 3: Instalar las dependencias, incluyendo flake8
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Flake8 # Paso 4: Ejecutar Flake8 en el código
      run: |
        python -m flake8 .
      # Si flake8 encuentra errores, este paso fallará y el job fallará.
      # GitHub Actions mostrará un error en el PR.

  format_check:
    name: Check Black Formatting # Nombre del job para verificar formateo
    runs-on: ubuntu-latest # También en una máquina virtual Linux

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x' # Misma versión de Python

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Black formatting # Paso 4: Ejecutar Black en modo de verificación
      run: |
        python -m black . --check --diff
      # --check: Black no modifica archivos, solo devuelve un código de salida si el código no está formateado.
      # --diff: Muestra las diferencias que Black haría si se ejecutara sin --check.
      # Si Black encuentra que el código no está formateado, este paso fallará y el job fallará.